version: "3.8"

services:

  mysql:
    image: mysql:latest
    container_name: franchise-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: franchise_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  franchise-api:
    build: .
    container_name: franchise-api
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/franchise_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: